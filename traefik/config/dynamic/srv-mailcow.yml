---

# Temporary: routes mail.krahl.io to the home server over NetBird.
# Long-term, all public services will route through NetBird directly
# and this file will be removed.

http:
  routers:
    mailcow-admin:
      entryPoints:
        - websecure
      rule: Host(`mail.krahl.io`) && PathPrefix(`/admin`)
      service: mailcow-backend@file
      tls:
        certResolver: letsencrypt-dns
      priority: 100
      middlewares:
        - de-only@file
        - websecure-protect@file
        - auth-basic@file

    mailcow:
      entryPoints:
        - websecure
      rule: "Host(`mail.krahl.io`)"
      service: mailcow-backend@file
      tls:
        certResolver: letsencrypt-dns
      priority: 50
      middlewares:
        - de-only@file
        - websecure-protect@file

  services:
    mailcow-backend:
      loadBalancer:
        serversTransport: home-server-transport
        servers:
          - url: "https://100.69.1.1:443"
