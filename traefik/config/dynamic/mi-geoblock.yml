---

# GeoBlock middleware configuration for Traefik

http:
  middlewares:
    geoblock:
      plugin:
        geoblock:
          logFilePath: /var/log/traefik/geoblock.log
          silentStartUp: false
          allowLocalRequests: true
          logLocalRequests: false
          logAllowedRequests: false
          logApiRequests: false
          api: "https://get.geojs.io/v1/ip/country/{ip}"
          apiTimeoutMs: 750
          cacheSize: 512
          forceMonthlyUpdate: true
          allowUnknownCountries: false
          unknownCountryApiResponse: "nil"
          blackListMode: true
          allowedIPAddresses:
            - "127.0.0.1/32"        # localhost IPv4
            - "::1/128"             # localhost IPv6
            - "172.0.0.0/8"         # Docker networks
            - "192.168.178.0/24"    # FritzBox LAN
            - "10.0.0.0/24"         # WireGuard VPN
            - "100.64.0.0/10"       # Netbird VPN
            - "2a0c:cbc2::/32"      # Stadtwerke Ludwigsburg IPv6 (home ISP)
          countries:
            - BD  # Bangladesh
            - BG  # Bulgaria
            - BR  # Brazil
            - BY  # Belarus
            - CN  # China
            - CU  # Cuba
            - HK  # Hong Kong
            - ID  # Indonesia
            - IN  # India
            - IR  # Iran (Islamic Republic of)
            - KP  # Korea (the Democratic People's Republic of)
            - MD  # Moldova
            - MM  # Myanmar
            - NG  # Nigeria
            - PK  # Pakistan
            - RO  # Romania
            - RU  # Russian Federation (the)
            - SG  # Singapore
            - SY  # Syria
            - TR  # Turkey
            - VE  # Venezuela (Bolivarian Republic of)
            - VN  # Vietnam
