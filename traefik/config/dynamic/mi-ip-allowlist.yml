---

# IP allowlist middleware for internal-only routes

http:
  middlewares:
    ip-allowlist:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"      # localhost IPv4
          - "::1/128"           # localhost IPv6
          - "192.168.178.0/24"  # FritzBox LAN
          - "10.0.0.0/24"       # WireGuard VPN
          - "100.64.0.0/10"     # Netbird VPN
          - "172.17.0.0/16"     # Docker default bridge network
          - "172.22.0.0/16"     # Docker custom networks (IPv4)
          - "fd00:db8::/64"     # Docker reverse-proxy network (IPv6)
