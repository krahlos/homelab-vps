---

# mas.krahl.io — VPS ingress for the home-server Matrix Authentication Service.

http:
  routers:
    matrix-mas:
      entryPoints:
        - websecure
      rule: Host(`mas.krahl.io`)
      service: matrix-mas-backend@file
      tls:
        certResolver: letsencrypt-dns
      middlewares:
        - websecure-protect@file

  services:
    matrix-mas-backend:
      loadBalancer:
        serversTransport: home-server-transport
        servers:
          - url: "https://100.69.1.1:443"
