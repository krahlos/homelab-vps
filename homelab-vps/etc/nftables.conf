#!/usr/sbin/nft -f

# Deletes only our table; leaves Netbird's netbird table intact.
# "flush ruleset" would wipe Netbird's rules — do not use it.
table inet filter
delete table inet filter

table inet filter {

	###########################################################################
	# Sets
	###########################################################################

	# IPv4 SSH bruteforce tracking — populated dynamically by the rate-limit
	# rule below; entries expire after 5 minutes automatically.
	set ssh_bruteforce4 {
		type ipv4_addr
		flags dynamic, timeout
		timeout 5m
	}

	# IPv6 SSH bruteforce tracking
	set ssh_bruteforce6 {
		type ipv6_addr
		flags dynamic, timeout
		timeout 5m
	}

	# Manual IPv4 blocklist — add entries at runtime without reloading:
	#	 nft add element inet filter blocklist4 { 1.2.3.4 }
	set blocklist4 {
		type ipv4_addr
		flags interval
	}

	# Manual IPv6 blocklist
	set blocklist6 {
		type ipv6_addr
		flags interval
	}


	###########################################################################
	# Inbound
	###########################################################################

	chain input {
		type filter hook input priority filter; policy drop;

		# Manual blocklists (checked before anything else)
		ip	saddr @blocklist4 drop
		ip6 saddr @blocklist6 drop

		# Loopback — always allow
		iifname lo accept

		# Established / related — allow replies and related flows
		ct state established,related accept

		# Invalid conntrack state — drop silently
		ct state invalid drop

		# Netbird mesh interface
		iifname "wt0" accept

		# ICMPv4 — allow echo-request with rate limit and all control traffic
		ip protocol icmp icmp type echo-request limit rate 10/second accept
		ip protocol icmp accept

		# ICMPv6 required for IPv6 operation (NDP, PMTUD, SLAAC)
		ip6 nexthdr icmpv6 icmpv6 type {
			echo-request,
			echo-reply,
			nd-neighbor-solicit,
			nd-neighbor-advert,
			nd-router-solicit,
			nd-router-advert,
			mld-listener-query,
			mld-listener-report,
			destination-unreachable,
			packet-too-big,
			time-exceeded,
			parameter-problem
		} accept

		# SSH on non-standard admin port with bruteforce throttling
		ip	saddr @ssh_bruteforce4 drop
		ip6 saddr @ssh_bruteforce6 drop
		tcp dport 2503 ct state new \
			add @ssh_bruteforce4 { ip	saddr timeout 5m limit rate over 5/minute } drop
		tcp dport 2503 ct state new \
			add @ssh_bruteforce6 { ip6 saddr timeout 5m limit rate over 5/minute } drop
		tcp dport 2503 accept

		# Honeypot listeners
		tcp dport { 22, 2222 } accept

		# Public web and ACME
		tcp dport { 80, 443 } accept

		# Mail ingress proxy listeners
		tcp dport { 25, 143, 465, 587, 993 } accept

		# Netbird server / proxy UDP listeners
		udp dport { 3478, 51820 } accept

		# Monitoring endpoints are reachable only via Netbird interface
		iifname "wt0" tcp dport { 8080, 9100 } accept

		# Docker bridge -> host traffic (container to host)
		iifname "docker0" accept
		iifname "br-*" accept

		# Everything else — dropped by policy.
	}


	###########################################################################
	# Forwarding
	###########################################################################

	chain forward {
		type filter hook forward priority filter; policy drop;

		ct state established,related accept
		ct state invalid drop

		# Netbird mesh — wt0 traffic already vetted by netbird table ACLs
		iifname "wt0" accept
		oifname "wt0" accept

		# Docker forwarding — Docker enforces per-container policy itself
		iifname "docker0" accept
		oifname "docker0" accept
		iifname "br-*" accept
		oifname "br-*" accept
	}


	###########################################################################
	# Outbound
	###########################################################################

	chain output {
		type filter hook output priority filter; policy accept;

		# Outbound is unrestricted.
	}
}
